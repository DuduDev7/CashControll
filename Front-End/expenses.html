<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Despesas</title>
  </head>
  <body>
    <header>CashControll</header>

    <main>
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Valor</label>
        <input
          type="number"
          step="0.01"
          class="form-control"
          id="valor"
          placeholder="Digite o valor que entrou"
        />
      </div>
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Onde Gastou</label>
        <input
          type="text"
          class="form-control"
          id="fonte"
          placeholder="Da onde veio o dinheiro"
        />
      </div>
      <div class="mb-3">
        <label for="exampleFormControlInput1" class="form-label">Data</label>
        <input
          type="date"
          class="form-control"
          id="data"
          placeholder="Quando entrou o dinheiro"
        />
      </div>
      <br />
      <label for="exampleFormControlInput1" class="form-label"
        >Tipo de Despesa</label
      >
      <select class="form-select" aria-label="Default select example" id="tipo">
        <option selected>Selecione o tipo</option>
        <option value="essencial">Essencial</option>
        <option value="variavel">Variáveis</option>
        <option value="financeiro">Financeiros</option>
        <option value="outros">Outros</option>
      </select>
      <br />
      <div class="mb-3">
        <label for="exampleFormControlTextarea1" class="form-label"
          >Observação</label
        >
        <textarea
          class="form-control"
          id="observacao"
          rows="3"
          placeholder="Tem alguma observação?"
        ></textarea>
      </div>

      <button class="btn btn-primary w-100" onclick="adicionarDespesa()">Adicionar Despesa</button>

      <div class="essencial">
        <n3>Tabela Essencial</n3>
        <table class="tabela-essencial">
          <thead>
            <tr>
              <th>Valor</th>
              <th>Fonte</th>
              <th>Data</th>
              <th>Observação</th>
              <th>Ações</th>
            </tr>
          </thead>
        </table>
      </div>

      <div class="variavel">
        <n3>Tabela Variáveis</n3>
        <table class="tabela-variaveis">
          <thead>
            <tr>
              <th>Valor</th>
              <th>Fonte</th>
              <th>Data</th>
              <th>Observação</th>
              <th>Ações</th>
            </tr>
          </thead>
        </table>
      </div>

      <div class="financeiro">
        <n3>Tabela Financeiro</n3>
        <table class="tabela-financeiros">
          <thead>
            <tr>
              <th>Valor</th>
              <th>Fonte</th>
              <th>Data</th>
              <th>Observação</th>
              <th>Ações</th>
            </tr>
          </thead>
        </table>
      </div>

      <div class="outros">
        <n3>Tabela Outros</n3>
        <table class="tabela-outros">
          <thead>
            <tr>
              <th>Valor</th>
              <th>Fonte</th>
              <th>Data</th>
              <th>Observação</th>
              <th>Ações</th>
            </tr>
          </thead>
        </table>
      </div>
    </main>

    <footer></footer>

    <script type="module" src="js/expenses.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
