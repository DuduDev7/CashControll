<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Cadastro</title>
  </head>
  <body
    class="bg-light d-flex align-items-center justify-content-center vh-100"
  >
    <div class="card shadow p-4" style="width: 100%; max-width: 420px">
      <h3 class="text-center mb-3">Cadastro</h3>

      <div class="mb-3">
        <label class="form-label">Nome</label>
        <input
          id="nome"
          type="text"
          class="form-control"
          placeholder="Digite seu nome"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input
          id="email"
          type="email"
          class="form-control"
          placeholder="Digite seu email"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Senha</label>
        <input
          id="senha"
          type="password"
          class="form-control"
          placeholder="Crie uma senha"
        />
      </div>

      <div class="mb-3">
        <label class="form-label">Confirmar senha</label>
        <input
          id="confirmarSenha"
          type="password"
          class="form-control"
          placeholder="Confirme sua senha"
        />
      </div>

      <p id="resultado"></p>

      <button class="btn btn-success w-100" onclick="cadastrar()">
        Cadastrar
      </button>

      <p class="text-center mt-3 mb-0">
        <a href="index.html">Já tem login? Volte para login</a>
      </p>
    </div>

    <script src="js/auth.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
