<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/style.css" />
    <title>Receitas</title>
  </head>
  <body>
    <header>CashControll</header>

    <main>
      <form id="incomeForm">
        <div class="mb-3">
          <label for="exampleFormControlInput1" class="form-label">Valor</label>
          <input
            type="number"
            step="0.01"
            class="form-control"
            id="valor"
            placeholder="Digite o valor que entrou"
          />
        </div>
        <div class="mb-3">
          <label for="exampleFormControlInput1" class="form-label">Fonte</label>
          <input
            type="text"
            class="form-control"
            id="fonte"
            placeholder="Da onde veio o dinheiro"
          />
        </div>
        <div class="mb-3">
          <label for="exampleFormControlInput1" class="form-label">Data</label>
          <input
            type="date"
            class="form-control"
            id="data"
            placeholder="Quando entrou o dinheiro"
          />
        </div>
        <div class="mb-3">
          <label for="exampleFormControlTextarea1" class="form-label"
            >Observação</label
          >
          <textarea
            class="form-control"
            id="observacao"
            rows="3"
            placeholder="Tem alguma observação?"
          ></textarea>
        </div>

        <button type="submit" class="btn btn-success">Salvar</button>
      </form>

      <button><a href="histoIncomes.html">Historico</a></button>
    </main>

    <a class="back-btn" href="dashboard.html" aria-label="Voltar para dashboard">Voltar</a>


    <footer></footer>

    <script type="module" src="js/incomes.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
